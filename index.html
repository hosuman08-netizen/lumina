<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eden • Web3 Artistic</title>
  <meta name="description" content="Web3 성인 콘텐츠. Fictional artistic only. 18+ • p8 Legion.">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="container">
    <header>
      <div class="disclaimer">FICTIONAL ARTISTIC CONTENT ONLY • 18+ • NO REAL HUMANS • LEGION p8 × p6</div>
      <h1>EDEN</h1>
      <p class="tagline">Web3 Sensual Art • Voice as Breath • Limited Drops</p>
      
      <div class="wallet">
        <button onclick="connectWallet()" class="primary">Connect Wallet</button>
        <div id="wallet-info">Not connected • 0 EDEN</div>
      </div>
      <div class="wallet-utils">
        <button onclick="convertP7ToEDEN()" class="ghost">p7 Ache → EDEN Vault</button>
        <button onclick="playEmbodiment()" class="ghost">Play Lung Eye</button>
      </div>
      
      <nav class="nav">
        <button onclick="showFeed()" class="nav-btn active">Feed</button>
        <button onclick="showCreate()" class="nav-btn">Create</button>
        <button onclick="showDrops()" class="nav-btn">Drops</button>
        <button onclick="showVault()" class="nav-btn">Vault</button>
        <button onclick="showCodex()" class="nav-btn">Codex</button>
      </nav>
    </header>

    <!-- Feed -->
    <div id="feed" class="section">
      <h2>Artistic Feed</h2>
      <div id="content-feed" class="feed-grid"></div>
    </div>

    <!-- Create -->
    <div id="create" class="section hidden">
      <h2>Create Sensual Art</h2>
      <div class="form">
        <label>Title</label>
        <input id="art-title" placeholder="Moonlit Ache">
        
        <label>Voice (p6 Lung Surprise Eye)</label>
        <button onclick="recordP6Voice()">🎙 Record with p6 Aether</button>
        <div id="voice-preview"></div>
        
        <label>p3 Mycelial Co-Signature (companion)</label>
        <select id="companion-picker">
          <option value="">None</option>
          <option value="Luna Whisper">Luna Whisper (p3)</option>
          <option value="Vesper Veil">Vesper Veil (p3)</option>
          <option value="Echo Thorn">Echo Thorn (p3)</option>
        </select>
        
        <label>Intensity (0.618 Vitruvian)</label>
        <input id="intensity" type="range" min="0" max="1" step="0.01" value="0.618">
        
        <label>EDEN Cost to Mint</label>
        <input id="mint-cost" type="number" value="25">
        
        <button onclick="createAndMint()" class="primary">Mint as NFT (spend EDEN)</button>
      </div>
    </div>

    <!-- FOMO Drops -->
    <div id="drops" class="section hidden">
      <h2>Limited Eden Drops <span class="fomo">3 left today</span></h2>
      <div id="drop-list"></div>
    </div>

    <!-- Vault (owned collection + resale) -->
    <div id="vault" class="section hidden">
      <h2>🗝 My Vault</h2>
      <div id="vault-summary" class="vault-summary"></div>
      <div id="vault-list" class="feed-grid"></div>
    </div>

    <!-- Codex -->
    <div id="codex" class="section hidden">
      <h2>📓 Personal Codex</h2>
      <div id="codex-list"></div>
      <button onclick="reflect()">Reflect & Evolve</button>
    </div>
  </div>

  <script src="../p6-airpods-artistic/lung-surprise-eye.js"></script>
  <script src="script.js"></script>
</body>
</html>
